# 冒烟测试 - CLI Browser 验证任务
name: "冒烟测试"
description: "验证 OPC-HARNESS 应用基本功能"
url: "http://localhost:1420"

steps:
  - id: 1
    action: "navigate"
    description: "访问应用首页"
    expect: |
      页面正常加载，显示：
      - 标题包含 "OPC-HARNESS"
      - 页面无错误提示
      - 主要内容区域可见

  - id: 2
    action: "check_element"
    description: "检查导航菜单"
    selector: "nav, aside, [role='navigation'], .sidebar, .menu"
    expect: |
      导航菜单可见，包含以下链接：
      - Dashboard / 首页 / 仪表盘
      - Idea / 想法 / Vibe Design
      - Coding / 编码 / 开发
      - Marketing / 营销
      - Settings / 设置

  - id: 3
    action: "click"
    description: "点击 Idea 导航"
    target: "Idea,想法,Vibe Design"
    expect: |
      页面导航到 Idea 输入页面，显示：
      - 页面标题或标题包含 Idea
      - 文本输入区域可见
      - 提交或生成按钮存在

  - id: 4
    action: "navigate"
    description: "返回 Dashboard"
    url: "http://localhost:1420/"
    expect: "成功返回首页"

  - id: 5
    action: "click"
    description: "访问 Coding 工作区"
    target: "Coding,编码"
    expect: |
      页面显示 Coding 工作区，包含：
      - 代码编辑器区域（或编辑器容器）
      - 文件浏览器或项目树
      - 工作区布局可见

  - id: 6
    action: "check_error"
    description: "检查控制台错误"
    expect: |
      浏览器控制台没有严重的红色错误信息：
      - 没有 JavaScript 错误
      - 没有 404 资源加载错误
      - 允许有警告信息

success_criteria: |
  所有步骤通过，则认为冒烟测试成功。
  
report_template: |
  ## CLI Browser 验证报告
  
  **测试套件**: {suite_name}
  **验证时间**: {timestamp}
  **CLI 工具**: {cli_name}
  
